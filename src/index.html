<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>English Interview Practice</title>
<style>
  :root {
    --bg:#f7f7f8; --panel:#fff; --line:#ececf1; --txt:#1f2023; --muted:#8e8ea0;
    --neerja:#eef3ff; --neerja-b:#3b6fd4;
    --manish:#eafaf0; --manish-b:#1f9d57;
    --user:#10a37f; --danger:#e5484d;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg);
         color:var(--txt); height:100vh; display:flex; flex-direction:column; }

  header { background:var(--panel); border-bottom:1px solid var(--line);
           padding:14px 22px; display:flex; align-items:center; gap:12px; }
  .logo  { width:34px; height:34px; border-radius:9px;
           background:linear-gradient(135deg,#3b6fd4,#1f9d57);
           display:flex; align-items:center; justify-content:center; font-size:18px; }
  header h1  { font-size:1.02em; font-weight:600; }
  header .sub{ font-size:.74em; color:var(--muted); }
  #dot { width:9px; height:9px; border-radius:50%; background:#c9c9d1;
         margin-left:auto; transition:.3s; }
  #dot.on { background:#1f9d57; box-shadow:0 0 0 4px rgba(31,157,87,.15); }

  #chat { flex:1; overflow-y:auto; padding:24px 0; }
  .wrap { max-width:760px; margin:0 auto; padding:0 20px;
          display:flex; flex-direction:column; gap:18px; }

  .row    { display:flex; gap:12px; align-items:flex-start; }
  .row.me { flex-direction:row-reverse; }
  .av { width:30px; height:30px; border-radius:50%; flex-shrink:0;
        display:flex; align-items:center; justify-content:center;
        font-size:.72em; font-weight:700; color:#fff; }
  .av.neerja { background:var(--neerja-b); }
  .av.manish { background:var(--manish-b); }
  .av.me     { background:var(--user); }
  .msg  { max-width:74%; }
  .who  { font-size:.72em; color:var(--muted); margin-bottom:3px; font-weight:600; }
  .row.me .who { text-align:right; }
  .bubble { padding:11px 15px; border-radius:14px; line-height:1.5;
            font-size:.95em; white-space:pre-wrap; }
  .neerja .bubble { background:var(--neerja); border-top-left-radius:4px; }
  .manish .bubble { background:var(--manish); border-top-left-radius:4px; }
  .me     .bubble { background:var(--user); color:#fff; border-top-right-radius:4px; }
  .interim .bubble { opacity:.5; font-style:italic; }

  footer { background:var(--panel); border-top:1px solid var(--line); padding:16px; }
  .controls { max-width:760px; margin:0 auto;
              display:flex; align-items:center; gap:14px; }
  #status { flex:1; font-size:.82em; color:var(--muted); }

  .mic { width:58px; height:58px; border-radius:50%; border:none; cursor:pointer;
         font-size:22px; background:var(--user); color:#fff;
         display:flex; align-items:center; justify-content:center;
         transition:.2s; box-shadow:0 2px 10px rgba(16,163,127,.35); }
  .mic:hover  { transform:scale(1.05); }
  .mic.live   { animation:pulse 1.6s infinite; }
  .mic.off    { background:var(--danger); box-shadow:0 2px 10px rgba(229,72,77,.35); }
  .mic:disabled { background:#c9c9d1; box-shadow:none; cursor:not-allowed; }
  @keyframes pulse {
    0%   { box-shadow:0 0 0 0 rgba(16,163,127,.45); }
    70%  { box-shadow:0 0 0 14px rgba(16,163,127,0); }
    100% { box-shadow:0 0 0 0 rgba(16,163,127,0); }
  }
  .btn { padding:10px 20px; border:none; border-radius:22px;
         font-size:.9em; cursor:pointer; font-weight:600; }
  #end { background:transparent; color:var(--danger);
         border:1px solid var(--danger); display:none; }
  .hint { font-size:.72em; color:var(--muted); text-align:center; margin-top:8px; }
</style>
</head>
<body>

<header>
  <div class="logo">🎓</div>
  <div>
    <h1>English Interview Practice</h1>
    <div class="sub">with Neerja (coach) &amp; Manish (model answers)</div>
  </div>
  <div id="dot"></div>
</header>

<div id="chat"><div class="wrap" id="wrap"></div></div>

<footer>
  <div class="controls">
    <span id="status">Connecting…</span>
    <button class="mic live" id="mic" disabled>🎤</button>
    <button id="end" class="btn">End</button>
  </div>
  <div class="hint">Mic is always on. Use headphones to avoid echo.</div>
</footer>

<div id="audio"></div>

<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
<script>
const wrap=document.getElementById("wrap"),
      chat=document.getElementById("chat"),
      dot=document.getElementById("dot"),
      statusEl=document.getElementById("status"),
      micBtn=document.getElementById("mic"),
      endBtn=document.getElementById("end");

let room=null;

function bubble(role, who, text, interim=false){
  const id="interim-"+role;
  let row=document.getElementById(id);
  if(interim){
    if(!row){ row=make(role,who,text); row.id=id; row.classList.add("interim"); wrap.appendChild(row); }
    else row.querySelector(".bubble").textContent=text;
  } else {
    if(row) row.remove();
    wrap.appendChild(make(role,who,text));
  }
  chat.scrollTop=chat.scrollHeight;
}

function make(role,who,text){
  const init={neerja:"N",manish:"M",me:"Y"};
  const cls=role==="me"?"me":role;
  const row=document.createElement("div"); row.className="row "+cls;
  row.innerHTML=`<div class="av ${cls}">${init[role]||"?"}</div>`+
    `<div class="msg"><div class="who">${who}</div><div class="bubble">${text}</div></div>`;
  return row;
}

async function connect(){
  const {url,token}=await fetch("/token").then(r=>r.json());
  room=new LivekitClient.Room({adaptiveStream:true,dynacast:true});

  // Agent audio — attach each track automatically
  room.on(LivekitClient.RoomEvent.TrackSubscribed,(track)=>{
    if(track.kind!==LivekitClient.Track.Kind.Audio) return;
    const el=track.attach(); el.autoplay=true;
    document.getElementById("audio").appendChild(el);
  });

  // Agent joined
  room.on(LivekitClient.RoomEvent.ParticipantConnected,()=>{
    statusEl.textContent="Connected — listening…";
    dot.classList.add("on");
  });

  // Interim only — greyed text while speaking, so user sees live feedback
  room.on(LivekitClient.RoomEvent.TranscriptionReceived,(segs,p)=>{
    if(p.identity!==room.localParticipant.identity) return;
    segs.forEach(s=>{ if(s.text.trim() && !s.final) bubble("me","You",s.text,true); });
  });

  // All final captions via data channel — student sent first, then agent
  // This guarantees: student text always appears above agent response
  room.on(LivekitClient.RoomEvent.DataReceived,(data,p,kind,topic)=>{
    if(topic!=="caption") return;
    const {role,text}=JSON.parse(new TextDecoder().decode(data));
    if(role==="student")       bubble("me","You",text);
    else if(role==="neerja")   bubble("neerja","Neerja",text);
    else if(role==="manish")   bubble("manish","Manish",text);
  });

  room.on(LivekitClient.RoomEvent.Disconnected,()=>{
    dot.classList.remove("on");
    statusEl.textContent="Disconnected";
    micBtn.disabled=true; micBtn.classList.remove("live");
  });

  await room.connect(url,token);
  await room.startAudio();
  await room.localParticipant.setMicrophoneEnabled(true);

  statusEl.textContent="Connected — mic on";
  dot.classList.add("on");
  micBtn.disabled=false; micBtn.classList.add("live");
  endBtn.style.display="";
}

endBtn.onclick=()=>room&&room.disconnect();

// Any click unlocks audio autoplay
document.addEventListener("click",()=>{ if(room) room.startAudio(); });

// Auto-connect on load
window.addEventListener("load", connect);
</script>
</body>
</html>
